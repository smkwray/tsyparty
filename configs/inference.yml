version: 1
canonical_frequency: quarterly

# The pipeline excludes fed from the private-sector matrix and preserves
# a _residual bucket for the buyer-seller gap in every quarter.
exclude_sectors:
  - _total
  - _discrepancy
  - fed

entropy_ras:
  max_iter: 10000
  tol: 1.0e-8
  epsilon: 1.0e-12
  use_structural_zeros: true

sparse_sensitivity:
  enabled: true
  threshold_quantile: 0.65

sparse_cv:
  enabled: false
  quantiles: [0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80]

validation:
  require_market_clearing: true
  compare_to_fwtw_levels: true
  compare_to_auction_allotments: true
  compare_foreign_side_to_tic: true

claims:
  label_outputs_as_likely_net_counterparties: true
